<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Card background -->
  <rect x="5" y="5" width="38" height="38" rx="5" fill="white" stroke="#C0C8D4" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="5" y="5" width="38" height="10" rx="5" fill="#4D6B8A"/>
  <rect x="5" y="10" width="38" height="5" fill="#4D6B8A"/>
  <!-- Header label stub -->
  <rect x="10" y="10.5" width="13" height="2.5" rx="1.2" fill="rgba(255,255,255,0.55)"/>

  <!-- Row 1: visible field (label + value bar) -->
  <rect x="10" y="20" width="7" height="2" rx="1" fill="#9AAABB"/>
  <rect x="20" y="20" width="20" height="2" rx="1" fill="#2C3E50"/>

  <!-- Row 2: hidden empty field (dots instead of value) -->
  <rect x="10" y="25" width="7" height="2" rx="1" fill="#CCD4DC"/>
  <circle cx="21" cy="26" r="1.3" fill="#CCD4DC"/>
  <circle cx="25.5" cy="26" r="1.3" fill="#CCD4DC"/>
  <circle cx="30" cy="26" r="1.3" fill="#CCD4DC"/>

  <!-- Row 3: visible field (shorter value bar) -->
  <rect x="10" y="31" width="7" height="2" rx="1" fill="#9AAABB"/>
  <rect x="20" y="31" width="14" height="2" rx="1" fill="#2C3E50"/>

  <!-- Row 4: hidden empty field (dots) -->
  <rect x="10" y="36" width="7" height="2" rx="1" fill="#CCD4DC"/>
  <circle cx="21" cy="37" r="1.3" fill="#CCD4DC"/>
  <circle cx="25.5" cy="37" r="1.3" fill="#CCD4DC"/>
  <circle cx="30" cy="37" r="1.3" fill="#CCD4DC"/>
</svg>
